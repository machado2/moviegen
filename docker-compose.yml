name: mediagen
services:
  mediagen:
    build: .
    ports:
      - "3020:3000"
    volumes:
      - ./data:/data
    # Secrets (OPENROUTER_API_KEY, GEMINI_API_KEY, BYTEPLUS_API_KEY) come from
    # .env, which is gitignored. Copy .env.example to .env and fill it in.
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/data
